name: CI

on:
  push:
    branches: [main, 'feature/**', 'bugfix/**', 'hotfix/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run ESLint
        run: npm run lint:js

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run Jest
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Install only Chromium — matches the single browser configured in playwright.config.js.
      # --with-deps installs the OS-level libraries Chromium needs on ubuntu-latest.
      - run: npx playwright install --with-deps chromium
      # Python 3 is pre-installed on ubuntu-latest, so no setup step is needed
      # for the 'python -m http.server 8000' webServer command in playwright.config.js.
      # config.js is gitignored (contains real API keys locally) so it doesn't exist in CI.
      # Copy the template to give the app a valid config with DEFAULT_COMPANIES so the
      # company grid renders. Placeholder API keys are fine — no real API calls are made
      # in Playwright tests (Reed calls are intercepted; scorer is feature-flagged off).
      - name: Create config.js from template for CI
        run: cp config.template.js config.js
      - name: Run Playwright tests
        run: npm run test:e2e